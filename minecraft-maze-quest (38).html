function generateMaze(cols, rows) {
  const dirs = [
    { dc: 1,  dr: 0,  w: 1, ow: 3 },
    { dc: -1, dr: 0,  w: 3, ow: 1 },
    { dc: 0,  dr: 1,  w: 2, ow: 0 },
    { dc: 0,  dr: -1, w: 0, ow: 2 },
  ];

  // Step 1: Perfect maze (recursive backtracker)
  const grid = Array.from({ length: rows }, (_, r) =>
    Array.from({ length: cols }, (_, c) => ({ r, c, walls: [true, true, true, true], visited: false }))
  );
  const stack = [];
  grid[0][0].visited = true;
  stack.push(grid[0][0]);
  while (stack.length > 0) {
    const cur = stack[stack.length - 1];
    const neighbors = dirs
      .map(d => ({ cell: grid[cur.r + d.dr]?.[cur.c + d.dc], ...d }))
      .filter(d => d.cell && !d.cell.visited);
    if (neighbors.length === 0) { stack.pop(); continue; }
    const { cell, w, ow } = neighbors[Math.floor(Math.random() * neighbors.length)];
    cur.walls[w] = false;
    cell.walls[ow] = false;
    cell.visited = true;
    stack.push(cell);
  }

  // Step 2: นับทางเปิดของแต่ละ cell
  function openCount(r, c) {
    return dirs.filter(d => !grid[r][c].walls[d.w]).length;
  }

  // Step 3: Braid — ลบกำแพง dead-end ทุกช่อง (ช่องที่มีทางเดียว) 100%
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (openCount(r, c) === 1) {
        // หา neighbor ที่ยังมีกำแพงกั้นอยู่ แล้วลบออก
        const candidates = dirs.filter(d => {
          const nr = r + d.dr; const nc = c + d.dc;
          return nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[r][c].walls[d.w];
        });
        if (candidates.length > 0) {
          const pick = candidates[Math.floor(Math.random() * candidates.length)];
          const nr = r + pick.dr; const nc = c + pick.dc;
          grid[r][c].walls[pick.w] = false;
          grid[nr][nc].walls[pick.ow] = false;
        }
      }
    }
  }

  // Step 4: เพิ่มทางแยกเพิ่มเติมอีก ~25% เพื่อให้มีหลายเส้นทางชัดเจน
  const extra = Math.floor(cols * rows * 0.25);
  for (let i = 0; i < extra; i++) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    const candidates = dirs.filter(d => {
      const nr = r + d.dr; const nc = c + d.dc;
      return nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[r][c].walls[d.w];
    });
    if (candidates.length > 0) {
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      const nr = r + pick.dr; const nc = c + pick.dc;
      grid[r][c].walls[pick.w] = false;
      grid[nr][nc].walls[pick.ow] = false;
    }
  }

  return grid;
}

function shuffleArr(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function getRandomQ(usedIds) {
  const pool = ALL_QUESTIONS.filter(q => !usedIds.includes(q.id));
  if (!pool.length) return ALL_QUESTIONS[Math.floor(Math.random() * ALL_QUESTIONS.length)];
  return pool[Math.floor(Math.random() * pool.length)];
}

const MAZE_COLS = 7;
const MAZE_ROWS = 7;
const START_LIVES = 3;
const RETREAT_ON_DEATH = 2;
const RETREAT_ON_WRONG_FINAL = 3;

function MinecraftMazeGame() {
  const [screen, setScreen] = useState("intro");
  const [maze, setMaze] = useState(null);
  const [playerPos, setPlayerPos] = useState({ r: 0, c: 0 });
  const [lives, setLives] = useState(START_LIVES);
  const [hints, setHints] = useState([]);
  const [usedQIds, setUsedQIds] = useState([]);
  const [currentQ, setCurrentQ] = useState(null);
  const [selected, setSelected] = useState(null);
  const [result, setResult] = useState(null);
  const [pathHistory, setPathHistory] = useState([{ r: 0, c: 0 }]);
  const [shake, setShake] = useState(false);
  const [score, setScore] = useState(0);
  const [currentScenario, setCurrentScenario] = useState(null);
  const [pendingScenario, setPendingScenario] = useState(null); // สุ่มล่วงหน้าเพื่อให้ hint ตรง
  const [shuffledSteps, setShuffledSteps] = useState([]);
  const [placedSteps, setPlacedSteps] = useState([]);
  const [dragItem, setDragItem] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [finalResult, setFinalResult] = useState(null);
  const [wrongSlots, setWrongSlots] = useState([]); // index ของช่องที่เรียงผิด
  const [showBlockBreak, setShowBlockBreak] = useState(false);
  const [waitingMove, setWaitingMove] = useState(false); // รอผู้เล่นเลือกทิศทางหลังตอบถูก
  const [timeLeft, setTimeLeft] = useState(QUESTION_TIME);
  const timerRef = useRef(null);
  const currentQRef = useRef(null);
  const finalTimerRef = useRef(null);
  const [finalTimeLeft, setFinalTimeLeft] = useState(FINAL_TIME);
  const waitingMoveRef = useRef(false);
  const gameStartTimeRef = useRef(null);
  const [elapsedTime, setElapsedTime] = useState(0);
  // resetTimerTrigger เพิ่มขึ้นทุกครั้งที่ต้องการรีเวลาใหม่ (ตอบถูก / คำถามใหม่)
  const [resetTimerTrigger, setResetTimerTrigger] = useState(0);

  // Keep ref in sync with currentQ so timer closure always sees latest question
  useEffect(() => { currentQRef.current = currentQ; }, [currentQ]);
  useEffect(() => { waitingMoveRef.current = waitingMove; }, [waitingMove]);

  // Final stage timer
  useEffect(() => {
    if (screen !== "final") {
      clearInterval(finalTimerRef.current);
      return;
    }
    clearInterval(finalTimerRef.current);
    finalTimerRef.current = setInterval(() => {
      setFinalTimeLeft(prev => {
        if (prev <= 1) {
          clearInterval(finalTimerRef.current);
          // หมดเวลา → ลดเลือด
          setLives(prevLives => {
            const newLives = prevLives - 1;
            if (newLives <= 0) {
              // เลือดหมด → ถอยหลัง 2 ช่อง กลับ game
              setPathHistory(prevHistory => {
                const retreat = Math.max(0, prevHistory.length - 1 - 2);
                const newPos = prevHistory[retreat] || { r: 0, c: 0 };
                setPlayerPos(newPos);
                return prevHistory.slice(0, retreat + 1);
              });
              setTimeout(() => {
                setLives(START_LIVES);
                setWrongSlots([]);
                setFinalResult(null);
                setScreen("game");
                setUsedQIds(prevUsed => { setCurrentQ(getRandomQ(prevUsed)); return prevUsed; });
                setSelected(null);
                setResult(null);
              }, 1500);
            } else {
              // ยังมีเลือด → รีเซ็ตเวลาแล้วเริ่ม interval ใหม่
              setTimeout(() => {
                setFinalTimeLeft(FINAL_TIME);
                clearInterval(finalTimerRef.current);
                finalTimerRef.current = setInterval(() => {
                  setFinalTimeLeft(p => (p <= 1 ? (clearInterval(finalTimerRef.current), 0) : p - 1));
                }, 1000);
              }, 800);
            }
            return newLives <= 0 ? 0 : newLives;
          });
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(finalTimerRef.current);
  }, [screen]); // eslint-disable-line

  // FIX: Memoize stars so they don't re-render randomly each time
  const stars = useMemo(() =>
    Array.from({ length: 30 }).map((_, i) => ({
      left: `${Math.random() * 100}%`,
      top: `${Math.random() * 60}%`,
      duration: `${1 + Math.random() * 2}s`,
      delay: `${Math.random() * 2}s`,
    })), []
  );

  // HINT_POOL ถูกแทนด้วย pendingScenario.hints ที่สุ่มล่วงหน้า

  // Timer: รีเซ็ตและเริ่มใหม่เฉพาะเมื่อมีคำถามใหม่ (resetTimerTrigger เปลี่ยน)
  // ตอบผิด → timer เดินต่อ (ไม่ reset), ตอบถูก/หมดเวลา → reset
  useEffect(() => {
    if (screen !== "game" || !currentQ) {
      clearInterval(timerRef.current);
      return;
    }
    clearInterval(timerRef.current);
    setTimeLeft(QUESTION_TIME);
    timerRef.current = setInterval(() => {
      setTimeLeft(prev => {
        if (prev <= 1) {
          clearInterval(timerRef.current);
          setTimeout(() => {
            // หมดเวลา — ไม่ว่าจะกำลังตอบหรือเลือกทิศ → ถอยหลัง 1 ช่อง + คำถามใหม่
            setWaitingMove(false);
            setPathHistory(prevHistory => {
              if (prevHistory.length > 1) {
                const newPos = prevHistory[prevHistory.length - 2];
                setPlayerPos(newPos);
                return prevHistory.slice(0, prevHistory.length - 1);
              }
              return prevHistory;
            });
            const qId = currentQRef.current?.id;
            setUsedQIds(prevUsed => {
              const newUsed = qId ? [...prevUsed, qId] : prevUsed;
              setCurrentQ(getRandomQ(newUsed));
              return newUsed;
            });
            setSelected(null);
            setResult(null);
            // ไม่รีเซ็ตเวลา — timer เดินต่อ
          }, 0);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [screen, resetTimerTrigger]);

  function initGame() {
    const m = generateMaze(MAZE_COLS, MAZE_ROWS);
    setMaze(m);
    setPlayerPos({ r: 0, c: 0 });
    setLives(START_LIVES);
    setHints([]);
    setUsedQIds([]);
    setScore(0);
    setPathHistory([{ r: 0, c: 0 }]);
    const q = getRandomQ([]);
    setCurrentQ(q);
    setSelected(null);
    setResult(null);
    setWaitingMove(false);
    setResetTimerTrigger(t => t + 1);
    gameStartTimeRef.current = Date.now();
    // สุ่ม scenario ล่วงหน้าให้ hint ตรงกับด่านสุดท้าย
    const pending = FINAL_SCENARIOS[Math.floor(Math.random() * FINAL_SCENARIOS.length)];
    setPendingScenario(pending);
    setScreen("game");
  }

  function getNeighborCells(pos, currentMaze) {
    if (!currentMaze) return [];
    const cell = currentMaze[pos.r]?.[pos.c];
    if (!cell) return [];
    const dirs = [
      { dr: -1, dc: 0, wall: 0 },
      { dr: 0,  dc: 1, wall: 1 },
      { dr: 1,  dc: 0, wall: 2 },
      { dr: 0,  dc: -1, wall: 3 },
    ];
    return dirs
      .filter(d => !cell.walls[d.wall])
      .map(d => ({ r: pos.r + d.dr, c: pos.c + d.dc }))
      .filter(p => p.r >= 0 && p.r < MAZE_ROWS && p.c >= 0 && p.c < MAZE_COLS);
  }

  function isEnd(pos) { return pos.r === MAZE_ROWS - 1 && pos.c === MAZE_COLS - 1; }

  function buildHint(scenario, hintIndex) {
    if (!scenario) return `💡 คำใบ้ #${hintIndex + 1}`;
    const steps = scenario.steps;
    const total = steps.length;
    const pool = [
      () => `🔢 Flowchart นี้มีทั้งหมด ${total} ขั้นตอน`,
      () => {
        const first = steps[1];
        return `${first.type === "decision" ? "🔶" : "🔷"} ขั้นตอนแรกหลัง Start เป็น${first.type === "decision" ? "คำถาม/เงื่อนไข" : "การปฏิบัติ"}`;
      },
      () => {
        const last = steps[total - 2];
        return `${last.type === "decision" ? "🔶" : "🔷"} ขั้นตอนก่อนถึง End เป็น${last.type === "decision" ? "คำถาม/เงื่อนไข" : "การปฏิบัติ"}`;
      },
      () => {
        const dCount = steps.filter(s => s.type === "decision").length;
        return `🔶 มีขั้นตอนเงื่อนไข ${dCount} ขั้นใน Flowchart นี้`;
      },
      () => {
        const mid = steps[Math.floor(total / 2)];
        return `🔷 ขั้นตอนกลาง Flowchart ขึ้นต้นด้วยตัว "${mid.label.charAt(0)}"`;
      },
      () => {
        const s2 = steps[1];
        const words = s2.label.split(" ");
        return `🔷 ขั้นที่ 2 เกี่ยวกับ "${words[0]}${words[1] ? " " + words[1] : ""}..."`;
      },
      () => {
        const last = steps[total - 2];
        const words = last.label.split(" ");
        return `🔷 ขั้นก่อนจบ มีคำว่า "${words[words.length - 1]}" อยู่ด้วย`;
      },
      () => {
        const s3 = total > 3 ? steps[2] : steps[1];
        return `🔷 ขั้นที่ 3 เป็น${s3.type === "decision" ? "คำถาม/เงื่อนไข 🔶" : "ขั้นตอนปฏิบัติ 🔷"}`;
      },
    ];
    return pool[hintIndex % pool.length]();
  }

  function handleAnswer(idx) {
    if (selected !== null) return;
    setSelected(idx);
    const correct = idx === currentQ.ans;
    setResult(correct ? "correct" : "wrong");

    if (correct) {
      try {
        setHints(prev => {
          if (prev.length >= 8) return prev; // จำกัด 8 คำใบ้
          if (Math.random() < 0.5) return prev; // 50% สุ่มได้
          const hint = buildHint(pendingScenario, prev.length);
          return [...prev, hint];
        });
      } catch(e) { /* hint error ไม่ crash เกม */ }
      setScore(s => s + 10);
      setShowBlockBreak(true);
      setTimeout(() => setShowBlockBreak(false), 600);
      // ตอบถูก → รอให้ animation เสร็จก่อนแสดง D-pad (timer เดินต่อ)
      setTimeout(() => {
        setWaitingMove(true);
      }, 500);
    } else {
      // ตอบผิด → แสดงว่าผิด 1.2 วิ แล้วเปลี่ยนคำถามใหม่ทันที timer ยังเดินต่อ (ไม่ reset)
      setShake(true);
      setTimeout(() => setShake(false), 400);

      setLives(prevLives => {
        const newLives = prevLives - 1;
        setTimeout(() => {
          if (newLives <= 0) {
            setPathHistory(prevHistory => {
              const retreat = Math.max(0, prevHistory.length - 1 - RETREAT_ON_DEATH);
              const newPos = prevHistory[retreat] || { r: 0, c: 0 };
              setPlayerPos(newPos);
              return prevHistory.slice(0, retreat + 1);
            });
            setLives(START_LIVES);
          }
          // เปลี่ยนคำถามใหม่ ไม่ reset เวลา — timer เดินต่อจากที่เหลือ
          const qId = currentQRef.current?.id;
          setUsedQIds(prevUsed => {
            const newUsed = qId ? [...prevUsed, qId] : prevUsed;
            setCurrentQ(getRandomQ(newUsed));
            return newUsed;
          });
          setSelected(null);
          setResult(null);
          // ไม่เรียก setResetTimerTrigger → timer ไม่ reset
        }, 1200);
        return newLives;
      });
    }
  }

  function handleMove(dir) {
    if (!maze) return;
    const dirMap = {
      up:    { dr: -1, dc: 0, wall: 0 },
      right: { dr: 0,  dc: 1, wall: 1 },
      down:  { dr: 1,  dc: 0, wall: 2 },
      left:  { dr: 0,  dc: -1, wall: 3 },
    };
    const d = dirMap[dir];
    const cell = maze[playerPos.r]?.[playerPos.c];
    if (!cell || cell.walls[d.wall]) return; // มีกำแพง ไม่ให้เดิน
    const next = { r: playerPos.r + d.dr, c: playerPos.c + d.dc };
    if (next.r < 0 || next.r >= MAZE_ROWS || next.c < 0 || next.c >= MAZE_COLS) return;

    setWaitingMove(false);

    if (isEnd(next)) {
      setPlayerPos(next);
      startFinal(hints);
      return;
    }

    setPlayerPos(next);
    setPathHistory(h => {
      const already = h.some(p => p.r === next.r && p.c === next.c);
      return already ? h : [...h, next];
    });
    setUsedQIds(prevUsed => {
      const newUsed = [...prevUsed, currentQRef.current?.id].filter(Boolean);
      setCurrentQ(getRandomQ(newUsed));
      return newUsed;
    });
    setSelected(null);
    setResult(null);
    // ตอบถูกแล้วเดิน → เพิ่มเวลา 10 วิ (ไม่เกิน 60)
    setTimeLeft(prev => Math.min(prev + 10, QUESTION_TIME));
  }

  function startFinal(collectedHints) {
    const scenario = pendingScenario || FINAL_SCENARIOS[Math.floor(Math.random() * FINAL_SCENARIOS.length)];
    setCurrentScenario(scenario);
    setShuffledSteps(shuffleArr(scenario.steps));
    setPlacedSteps(Array(scenario.steps.length).fill(null));
    setFinalResult(null);
    setWrongSlots([]);
    setFinalTimeLeft(FINAL_TIME);
    setScreen("final");
  }

  function handleDragStart(step) { setDragItem(step); setWrongSlots([]); setFinalResult(null); }
  function handleDragOver(e, idx) { e.preventDefault(); setDragOver(idx); }
  function handleDrop(idx) {
    if (!dragItem) return;
    const newPlaced = [...placedSteps];
    const existingIdx = newPlaced.findIndex(s => s?.id === dragItem.id);
    if (existingIdx !== -1) newPlaced[existingIdx] = null;
    newPlaced[idx] = dragItem;
    setPlacedSteps(newPlaced);
    setDragItem(null);
    setDragOver(null);
  }

  function checkFinal() {
    const wrongIdx = currentScenario.steps
      .map((step, i) => placedSteps[i]?.id !== step.id ? i : -1)
      .filter(i => i !== -1);
    if (wrongIdx.length === 0) {
      clearInterval(finalTimerRef.current);
      setWrongSlots([]);
      setFinalResult("win");
      const secs = Math.floor((Date.now() - (gameStartTimeRef.current || Date.now())) / 1000);
      setElapsedTime(secs);
      setScreen("win");
    } else {
      // ไฮไลต์ช่องที่ผิด + ลดเลือด 1
      setWrongSlots(wrongIdx);
      setFinalResult("wrong");
      setLives(prevLives => {
        const newLives = prevLives - 1;
        if (newLives <= 0) {
          // เลือดหมด → ถอยหลัง 3 ช่อง แล้วกลับไป game
          setPathHistory(prevHistory => {
            // ถอยหลัง 2 ช่อง
            const retreat = Math.max(0, prevHistory.length - 1 - 2);
            const newPos = prevHistory[retreat] || { r: 0, c: 0 };
            setPlayerPos(newPos);
            return prevHistory.slice(0, retreat + 1);
          });
          setLives(START_LIVES);
          setTimeout(() => {
            clearInterval(finalTimerRef.current);
            setWrongSlots([]);
            setFinalResult(null);
            setScreen("game");
            setUsedQIds(prevUsed => {
              setCurrentQ(getRandomQ(prevUsed));
              return prevUsed;
            });
            setSelected(null);
            setResult(null);
          }, 2000);
        }
        return newLives <= 0 ? START_LIVES : newLives;
      });
    }
  }

  function removeFromSlot(idx) {
    const newPlaced = [...placedSteps];
    newPlaced[idx] = null;
    setPlacedSteps(newPlaced);
    setWrongSlots([]);
    setFinalResult(null);
  }

  const availableSteps = shuffledSteps.filter(s => !placedSteps.some(p => p?.id === s.id));
  const cellSize = Math.floor(Math.min(window.innerWidth - 32, 400) / MAZE_COLS);

  // ── RENDER MAZE ──
  function renderMaze() {
    if (!maze) return null;
    const neighbors = getNeighborCells(playerPos, maze);
    return (
      <div style={{ display: "inline-block", border: "4px solid #555", background: "#1a0a0a", position: "relative" }}>
        {maze.map((row, r) => (
          <div key={r} style={{ display: "flex" }}>
            {row.map((cell, c) => {
              const isPlayer = playerPos.r === r && playerPos.c === c;
              const isStart = r === 0 && c === 0;
              const isFinish = r === MAZE_ROWS - 1 && c === MAZE_COLS - 1;
              const isVisited = pathHistory.some(p => p.r === r && p.c === c);
              const isNeighbor = !isPlayer && neighbors.some(n => n.r === r && n.c === c);
              return (
                <div key={c} style={{
                  width: cellSize, height: cellSize,
                  position: "relative",
                  background: isPlayer ? "#1a3a7a" : isFinish ? "#3a2a00" : isStart ? "#0a2a0a" : isVisited ? "#1a0f06" : "#0d0806",
                  borderTop: cell.walls[0] ? "3px solid #555" : "3px solid transparent",
                  borderRight: cell.walls[1] ? "3px solid #555" : "3px solid transparent",
                  borderBottom: cell.walls[2] ? "3px solid #555" : "3px solid transparent",
                  borderLeft: cell.walls[3] ? "3px solid #555" : "3px solid transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "background 0.3s",
                  boxShadow: isPlayer ? "inset 0 0 12px #3366FF88" : isNeighbor ? "inset 0 0 6px #FFD70044" : "none",
                }}>
                  {isPlayer && (
                    <div style={{ animation: "pixelFloat 1.5s infinite" }}>
                      <Steve size={36} />
                    </div>
                  )}
                  {!isPlayer && isFinish && <span style={{ fontSize: 22 }}>🏆</span>}
                  {!isPlayer && !isFinish && isStart && <span style={{ fontSize: 14 }}>🚀</span>}
                  {!isPlayer && !isFinish && !isStart && isVisited && (
                    <div style={{ width: 6, height: 6, background: "#5D8A3C", borderRadius: 0 }} />
                  )}
                  {!isPlayer && isNeighbor && (
                    <div style={{ width: 8, height: 8, background: "#FFD70066", border: "1px solid #FFD700" }} />
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    );
  }

  // ─── SCREENS ─────────────────────────────────────────────────
  if (screen === "intro") return (
    <div style={{ minHeight: "100vh", background: "#1a1a2e", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 16 }}>
      {/* Stars - using memoized values to prevent re-render flicker */}
      <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, overflow: "hidden", pointerEvents: "none" }}>
        {stars.map((s, i) => (
          <div key={i} style={{ position: "absolute", left: s.left, top: s.top, width: 3, height: 3, background: "#fff", animation: `starTwinkle ${s.duration} ${s.delay} infinite` }} />
        ))}
      </div>

      <div style={{ textAlign: "center", animation: "pixelPop 0.5s ease", maxWidth: 520, position: "relative", zIndex: 1 }}>
        <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 6, flexWrap: "wrap" }}>
          {["M","A","Z","E"].map((l, i) => (
            <div key={i} style={{ background: "#5D8A3C", border: "3px solid #3a5a20", width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", animation: `pixelFloat ${1 + i * 0.1}s ${i * 0.1}s infinite` }}>
              <span className="mc-font" style={{ fontSize: 22, color: "#fff", textShadow: "2px 2px #000" }}>{l}</span>
            </div>
          ))}
          <div style={{ width: 10 }} />
          {["Q","U","I","Z"].map((l, i) => (
            <div key={i} style={{ background: "#3355AA", border: "3px solid #1a3377", width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", animation: `pixelFloat ${1.2 + i * 0.1}s ${i * 0.1}s infinite` }}>
              <span className="mc-font" style={{ fontSize: 22, color: "#FFD700", textShadow: "2px 2px #000" }}>{l}</span>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 16 }}>
          {["C","H","A","R","T"].map((l, i) => (
            <div key={i} style={{ background: "#AA3355", border: "3px solid #771133", width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", animation: `pixelFloat ${1.4 + i * 0.1}s ${i * 0.1}s infinite` }}>
              <span className="mc-font" style={{ fontSize: 22, color: "#fff", textShadow: "2px 2px #000" }}>{l}</span>
            </div>
          ))}
        </div>

        <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 24 }}>
          <div className="pixel-float" style={{ animationDelay: "0s" }}><Steve size={56} /></div>
          <div className="pixel-float" style={{ animationDelay: "0.5s" }}><Creeper size={48} /></div>
          <div className="pixel-float" style={{ animationDelay: "0.3s" }}><Steve size={56} /></div>
        </div>

        <div style={{ background: "#0d0d0d", border: "4px solid #555", padding: 16, marginBottom: 20, textAlign: "left" }}>
          <div className="mc-font" style={{ fontSize: 22, color: "#FFD700", marginBottom: 12 }}>กติกาการเล่น</div>
          <div className="mc-font-sm" style={{ fontSize: 20, color: "#fff", lineHeight: 1.8 }}>
            ❤️ พลังชีวิต <span style={{ color: "#FF4444" }}>3</span> ดวง<br />
            ✅ ตอบถูก → เลือกทิศทางเดินเขาวงกต<br />
            💡 สุ่มได้คำใบ้ (สะสมได้สูงสุด <span style={{ color: "#FFD700" }}>8</span> ข้อ)<br />
            ⏱️ เวลาตอบ <span style={{ color: "#FF4444" }}>60</span> วิ — ตอบถูกเวลารีเซ็ต<br />
            ⌛ หมดเวลา → ถอยหลัง <span style={{ color: "#FF4444" }}>1</span> ช่อง<br />
            ❌ ตอบผิด → คำถามใหม่, พลัง −1<br />
            💀 พลังหมด → ถอยหลัง <span style={{ color: "#FF4444" }}>2</span> ช่อง<br />
            🏆 ถึงปลายทาง → ด่านสุดท้าย Flowchart!<br />
            📋 เรียง Flowchart ผิด → ❤️−1 (หมดถอยหลัง <span style={{ color: "#FF4444" }}>2</span> ช่อง)
          </div>
        </div>

        <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
          <div style={{ background: "#333", border: "2px solid #FFD700", padding: "4px 16px" }}>
            <span className="mc-font-sm" style={{ fontSize: 22, color: "#FFD700" }}>🌍 ความรู้ทั่วไป 100 ข้อ</span>
          </div>
        </div>

        <div style={{ marginTop: 24 }}>
          <button className="mc-btn mc-btn-green" style={{ fontSize: 24, padding: "12px 40px" }} onClick={initGame}>
            ▶ เริ่มเกม
          </button>
        </div>
      </div>
    </div>
  );

  if (screen === "game") return (
    <div style={{ minHeight: "100vh", background: "#1a1a2e", padding: 12, display: "flex", flexDirection: "column", alignItems: "center" }}>
      {/* HUD */}
      <div style={{ width: "100%", maxWidth: 600, marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div className="mc-font-sm" style={{ fontSize: 20, color: "#aaa" }}>พลังชีวิต</div>
          <div style={{ display: "flex", gap: 2 }}>
            {Array.from({ length: START_LIVES }).map((_, i) => <Heart key={i} filled={i < lives} />)}
          </div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div className="mc-font" style={{ fontSize: 20, color: "#FFD700" }}>SCORE</div>
          <div className="mc-font-sm" style={{ fontSize: 28, color: "#fff" }}>{score}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div className="mc-font-sm" style={{ fontSize: 20, color: "#aaa" }}>คำใบ้</div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 4 }}>
            <span style={{ fontSize: 16 }}>💡</span>
            <span className="mc-font-sm" style={{ fontSize: 22, color: hints.length > 0 ? "#7FFF00" : "#555" }}>{hints.length}</span>
          </div>
        </div>
      </div>

      {/* Maze */}
      <div style={{ marginBottom: 12, position: "relative" }}>
        {renderMaze()}
        {showBlockBreak && (
          <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", fontSize: 32, animation: "blockBreak 0.6s ease forwards", pointerEvents: "none" }}>
            ⛏️
          </div>
        )}
      </div>

      {/* D-Pad Direction Buttons */}
      {waitingMove && (
        <div style={{ marginBottom: 10, textAlign: "center" }}>
          <div className="mc-font-sm" style={{ fontSize: 20, color: "#7FFF00", marginBottom: 6 }}>
            ✅ ถูกต้อง! เลือกทิศทางที่จะเดิน
          </div>
          {(() => {
            const cell = maze?.[playerPos.r]?.[playerPos.c];
            const canUp    = cell && !cell.walls[0] && playerPos.r > 0;
            const canRight = cell && !cell.walls[1] && playerPos.c < MAZE_COLS - 1;
            const canDown  = cell && !cell.walls[2] && playerPos.r < MAZE_ROWS - 1;
            const canLeft  = cell && !cell.walls[3] && playerPos.c > 0;
            const dpadSize = Math.min(64, Math.floor((window.innerWidth - 48) / 3));
            const btnStyle = (enabled) => ({
              width: dpadSize, height: dpadSize,
              background: enabled ? "#3355AA" : "#222",
              border: enabled ? "3px solid #7799FF" : "3px solid #444",
              borderBottom: enabled ? "5px solid #112277" : "5px solid #111",
              color: enabled ? "#fff" : "#555",
              fontSize: Math.floor(dpadSize * 0.45),
              cursor: enabled ? "pointer" : "default",
              fontFamily: "monospace",
              display: "flex", alignItems: "center", justifyContent: "center",
              touchAction: "manipulation",
            });
            return (
              <div style={{ display: "inline-grid", gridTemplateColumns: `${dpadSize}px ${dpadSize}px ${dpadSize}px`, gridTemplateRows: `${dpadSize}px ${dpadSize}px ${dpadSize}px`, gap: 4 }}>
                <div />
                <button style={btnStyle(canUp)}    onClick={() => canUp    && handleMove("up")}>▲</button>
                <div />
                <button style={btnStyle(canLeft)}  onClick={() => canLeft  && handleMove("left")}>◀</button>
                <div style={{ background: "#1a1a2e", border: "3px solid #333", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Steve size={28} />
                </div>
                <button style={btnStyle(canRight)} onClick={() => canRight && handleMove("right")}>▶</button>
                <div />
                <button style={btnStyle(canDown)}  onClick={() => canDown  && handleMove("down")}>▼</button>
                <div />
              </div>
            );
          })()}
        </div>
      )}

      {/* Legend */}
      <div style={{ display: "flex", gap: 12, marginBottom: 10 }}>
        {[["🧑‍💻","ผู้เล่น"],["🚀","เริ่ม"],["🏆","ออก"],["🟩","เส้นทาง"]].map(([icon, label], i) => (
          <div key={i} className="mc-font-sm" style={{ fontSize: 14, color: "#888", display: "flex", alignItems: "center", gap: 4 }}>
            <span>{icon}</span>{label}
          </div>
        ))}
      </div>

      {/* Question Card - ซ่อนตอนรอเลือกทิศ */}
      {currentQ && !waitingMove && (
        <div className={shake ? "pixel-shake" : ""} style={{ width: "100%", maxWidth: 600, background: "#111", border: "4px solid #555", padding: 14 }}>
          {/* Timer bar */}
          <div style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <span className="mc-font-sm" style={{ fontSize: 20, color: timeLeft <= 10 ? "#FF4444" : timeLeft <= 30 ? "#FFD700" : "#7FFF00" }}>⏱️ {timeLeft} วินาที</span>
              <span className="mc-font-sm" style={{ fontSize: 18, color: "#888" }}>{Math.round(timeLeft / QUESTION_TIME * 100)}%</span>
            </div>
            <div style={{ width: "100%", height: 8, background: "#333", border: "1px solid #555" }}>
              <div style={{
                width: `${(timeLeft / QUESTION_TIME) * 100}%`,
                height: "100%",
                background: timeLeft <= 10 ? "#FF4444" : timeLeft <= 30 ? "#FFD700" : "#5D8A3C",
                transition: "width 1s linear, background 0.5s",
              }} />
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ background: "#333", border: "2px solid #666", padding: "2px 8px" }}>
                <span className="mc-font-sm" style={{ fontSize: 22, color: "#FFD700" }}>{currentQ.cat}</span>
              </span>

            </div>
            <span className="mc-font-sm" style={{ fontSize: 20, color: "#888" }}>ตำแหน่ง ({playerPos.r},{playerPos.c})</span>
          </div>
          <div className="mc-font-sm" style={{ fontSize: 24, color: "#fff", marginBottom: 12, lineHeight: 1.5 }}>
            {currentQ.q}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {currentQ.choices.map((ch, i) => {
              let cls = "choice-btn choice-btn-default";
              if (selected !== null) {
                if (i === currentQ.ans) cls = "choice-btn choice-btn-correct";
                else if (i === selected) cls = "choice-btn choice-btn-wrong";
                else cls = "choice-btn choice-btn-dim";
              }
              return (
                <button key={i} className={cls} onClick={() => handleAnswer(i)} disabled={selected !== null}>
                  {["A","B","C","D"][i]}) {ch}
                </button>
              );
            })}
          </div>
          {result && (
            <div className="mc-font-sm" style={{ fontSize: 22, marginTop: 10, color: result === "correct" ? "#7FFF00" : "#FF4444", textAlign: "center" }}>
              {result === "correct"
                ? `✅ ถูกต้อง! +10 คะแนน`
                : `❌ ผิด! คำตอบคือ: ${currentQ.choices[currentQ.ans]}`}
            </div>
          )}
        </div>
      )}

      {/* Hints inventory */}
      {hints.length > 0 && !waitingMove && (
        <div style={{ width: "100%", maxWidth: 600, marginTop: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexWrap: "wrap", gap: 4 }}>
            <div className="mc-font" style={{ fontSize: 20, color: "#FFD700" }}>💡 คำใบ้ด่านสุดท้าย</div>
            {pendingScenario && (
              <div style={{ background: "#1a1a00", border: "1px solid #666600", padding: "2px 8px" }}>
                <span className="mc-font-sm" style={{ fontSize: 18, color: "#CCCC00" }}>🎯 {pendingScenario.topic}</span>
              </div>
            )}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
            {hints.map((h, i) => (
              <div key={i} style={{ background: "#0d2b0d", border: "2px solid #3a6a3a", padding: "4px 10px", display: "flex", alignItems: "center", gap: 8 }}>
                <span className="mc-font-sm" style={{ fontSize: 16, color: "#445544", minWidth: 20 }}>#{i+1}</span>
                <span className="mc-font-sm" style={{ fontSize: 19, color: "#7FFF00" }}>{h}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <button className="mc-btn mc-btn-red" style={{ marginTop: 16, fontSize: 22 }} onClick={() => setScreen("intro")}>
        ◀ เมนูหลัก
      </button>
    </div>
  );

  if (screen === "final") return (
    <div style={{ minHeight: "100vh", background: "#0d0d1a", padding: 12, display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ width: "100%", maxWidth: 660 }}>
        <div style={{ textAlign: "center", marginBottom: 12 }}>
          <div className="mc-font" style={{ fontSize: 28, color: "#FFD700", textShadow: "2px 2px #000" }}>⚔️ FINAL STAGE ⚔️</div>
          <div className="mc-font-sm" style={{ fontSize: 22, color: "#aaa", marginTop: 4 }}>โจทย์: {currentScenario?.topic}</div>
          {/* Final Timer Bar */}
          <div style={{ marginTop: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <span className="mc-font-sm" style={{ fontSize: 20, color: finalTimeLeft <= 10 ? "#FF4444" : finalTimeLeft <= 20 ? "#FFD700" : "#7FFF00" }}>
                ⏱️ {finalTimeLeft} วินาที
              </span>
              <div style={{ display: "flex", gap: 3 }}>
                {Array.from({ length: START_LIVES }).map((_, i) => <Heart key={i} filled={i < lives} />)}
              </div>
            </div>
            <div style={{ width: "100%", height: 10, background: "#333", border: "1px solid #555" }}>
              <div style={{
                width: `${(finalTimeLeft / FINAL_TIME) * 100}%`,
                height: "100%",
                background: finalTimeLeft <= 10 ? "#FF4444" : finalTimeLeft <= 20 ? "#FFD700" : "#5D8A3C",
                transition: "width 1s linear, background 0.5s",
              }} />
            </div>
          </div>
        </div>

        <div style={{ background: "#111", border: "3px solid #555", padding: 12, marginBottom: 12 }}>
          <div className="mc-font-sm" style={{ fontSize: 22, color: "#FFD700", marginBottom: 6 }}>📋 วิธีการ</div>
          <div className="mc-font-sm" style={{ fontSize: 20, color: "#ccc", lineHeight: 1.9 }}>
            🖱️ <span style={{color:"#FFD700"}}>ลาก</span> ขั้นตอนจากซ้ายไปวางใน Flowchart ขวา<br />
            🗑️ <span style={{color:"#FFD700"}}>คลิก</span> ที่ช่องที่วางแล้ว เพื่อ<span style={{color:"#FF6666"}}>ลบ</span>ออก<br />
            🔄 <span style={{color:"#FFD700"}}>ลากทับ</span> ช่องที่ต้องการ เพื่อ<span style={{color:"#7FFF00"}}>เปลี่ยน</span>ขั้นตอน<br />
            ✅ กดตรวจสอบ เมื่อเรียงครบทุกช่องแล้ว
          </div>
        </div>

        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", flexDirection: window.innerWidth < 500 ? "column" : "row" }}>
          {/* Available steps */}
          <div style={{ flex: "1 1 200px", minWidth: 180 }}>
            <div className="mc-font" style={{ fontSize: 20, color: "#aaa", marginBottom: 8 }}>ขั้นตอนที่มี</div>
            {availableSteps.map(step => (
              <div
                key={step.id}
                className="flow-step"
                draggable
                onDragStart={() => handleDragStart(step)}
                style={{ borderColor: step.type === "start" ? "#7FFF00" : step.type === "end" ? "#FF4444" : step.type === "decision" ? "#FFD700" : "#4488FF" }}
              >
                <span style={{ fontSize: 18 }}>{step.type === "start" ? "🟢" : step.type === "end" ? "🔴" : step.type === "decision" ? "🔶" : "🔷"}</span>
                <span className="mc-font-sm" style={{ fontSize: 20 }}>{step.label}</span>
              </div>
            ))}
            {availableSteps.length === 0 && (
              <div className="mc-font-sm" style={{ fontSize: 20, color: "#555", padding: 8 }}>ใช้หมดแล้ว ✓</div>
            )}
          </div>

          {/* Flowchart slots */}
          <div style={{ flex: "1 1 200px", minWidth: 200 }}>
            <div className="mc-font" style={{ fontSize: 20, color: "#aaa", marginBottom: 8 }}>Flowchart</div>
            {placedSteps.map((step, i) => {
              const isWrong = wrongSlots.includes(i);
              return (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <div
                    className={`flow-slot ${dragOver === i ? "drag-over" : ""} ${step ? "filled" : ""}`}
                    style={{
                      flex: 1,
                      ...(isWrong ? {
                        background: "#3a0a0a",
                        borderColor: "#FF4444",
                        borderStyle: "solid",
                        animation: "pixelPop 0.3s ease",
                      } : {}),
                    }}
                    onDragOver={e => handleDragOver(e, i)}
                    onDrop={() => handleDrop(i)}
                    onClick={() => step && removeFromSlot(i)}
                  >
                    {step ? (
                      <>
                        <span style={{ fontSize: 18 }}>{step.type === "start" ? "🟢" : step.type === "end" ? "🔴" : step.type === "decision" ? "🔶" : "🔷"}</span>
                        <span className="mc-font-sm" style={{ fontSize: 20, color: isWrong ? "#FF6666" : undefined }}>{step.label}</span>
                        {isWrong && <span style={{ marginLeft: "auto", fontSize: 16 }}>❌</span>}
                      </>
                    ) : (
                      <span className="mc-font-sm" style={{ fontSize: 20 }}>ขั้นที่ {i + 1}...</span>
                    )}
                  </div>
                  {i < placedSteps.length - 1 && (
                    <div className="mc-font-sm" style={{ fontSize: 22, color: "#555", transform: "rotate(90deg)" }}>↓</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Hints Panel */}
        <div style={{ background: "#0d2b0d", border: "3px solid #3a6a3a", padding: 0, marginTop: 12, overflow: "hidden" }}>
          {/* Header */}
          <div style={{ background: "#164716", padding: "8px 12px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div className="mc-font-sm" style={{ fontSize: 21, color: "#FFD700" }}>
              💡 คำใบ้ช่วยเรียง Flowchart
            </div>
            <div style={{ background: "#0d2b0d", border: "1px solid #3a6a3a", padding: "2px 10px" }}>
              <span className="mc-font-sm" style={{ fontSize: 18, color: hints.length > 0 ? "#7FFF00" : "#556655" }}>
                {hints.length} ใบ้ที่สะสม
              </span>
            </div>
          </div>
          <div style={{ padding: "10px 12px" }}>
            {hints.length === 0 ? (
              <div className="mc-font-sm" style={{ fontSize: 20, color: "#556655", textAlign: "center", padding: "8px 0" }}>
                😔 ยังไม่มีคำใบ้ — กลับไปตอบถูกในเขาวงกตเพื่อรับคำใบ้
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                {hints.map((h, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, background: "#071407", border: "1px solid #3a5a3a", padding: "7px 10px" }}>
                    <span className="mc-font-sm" style={{ fontSize: 16, color: "#FFD700", minWidth: 22, paddingTop: 1 }}>#{i+1}</span>
                    <span className="mc-font-sm" style={{ fontSize: 19, color: "#7FFF00", lineHeight: 1.5 }}>{h}</span>
                  </div>
                ))}
                <div className="mc-font-sm" style={{ fontSize: 17, color: "#445544", marginTop: 4 }}>
                  📌 ใช้คำใบ้ข้างต้นเพื่อหาลำดับที่ถูกต้องในช่อง Flowchart
                </div>
              </div>
            )}
          </div>
        </div>

        {finalResult === "wrong" && (
          <div style={{ marginTop: 10, background: "#2a0a0a", border: "2px solid #FF4444", padding: "10px 14px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8, marginBottom: 6 }}>
              <div className="mc-font-sm" style={{ fontSize: 22, color: "#FF4444" }}>
                ❌ เรียงผิด {wrongSlots.length} ช่อง!
              </div>
              <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
                {Array.from({ length: START_LIVES }).map((_, i) => (
                  <Heart key={i} filled={i < lives} />
                ))}
              </div>
            </div>
            {lives <= 0 ? (
              <div className="mc-font-sm" style={{ fontSize: 20, color: "#FF4444" }}>
                💀 เลือดหมด! กำลังถอยหลัง 2 ช่อง...
              </div>
            ) : (
              <div style={{ borderTop: "1px solid #553333", paddingTop: 8 }}>
                <div className="mc-font-sm" style={{ fontSize: 19, color: "#FFB0B0", lineHeight: 1.8 }}>
                  🗑️ <span style={{color:"#FFD700"}}>คลิก</span> ช่องสีแดง → ลบออก แล้วลากขั้นตอนใหม่มาใส่<br />
                  🔄 หรือ <span style={{color:"#FFD700"}}>ลากขั้นตอน</span>ใหม่ <span style={{color:"#FFD700"}}>ทับ</span> ช่องสีแดงได้เลย<br />
                  ⚠️ ระวัง! ตอบผิดอีก เลือด −1 หมดแล้วถอยหลัง 2 ช่อง
                </div>
              </div>
            )}
          </div>
        )}

        <div style={{ display: "flex", gap: 8, marginTop: 14, justifyContent: "center" }}>
          <button
            className="mc-btn mc-btn-gold"
            style={{ fontSize: 22 }}
            onClick={checkFinal}
            disabled={placedSteps.some(s => s === null)}
          >
            ✅ ตรวจสอบ Flowchart
          </button>
          <button className="mc-btn mc-btn-red" style={{ fontSize: 22 }} onClick={() => setPlacedSteps(Array(currentScenario.steps.length).fill(null))}>
            🔄 ล้างทั้งหมด
          </button>
        </div>
      </div>
    </div>
  );

  if (screen === "win") return (
    <div style={{ minHeight: "100vh", background: "#0a1a0a", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ textAlign: "center", animation: "pixelPop 0.5s ease" }}>
        <div style={{ fontSize: 72, marginBottom: 8 }}>🏆</div>
        <div className="mc-font" style={{ fontSize: 36, color: "#FFD700", textShadow: "3px 3px #000", marginBottom: 8 }}>YOU WIN!</div>
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 16 }}>
          {Array.from({ length: 5 }).map((_, i) => (
            <div key={i} style={{ animation: `pixelFloat ${0.5 + i * 0.1}s infinite` }}>
              <Steve size={40} />
            </div>
          ))}
        </div>
        <div style={{ background: "#111", border: "4px solid #FFD700", padding: 16, marginBottom: 16 }}>
          <div className="mc-font-sm" style={{ fontSize: 24, color: "#7FFF00" }}>
            🌟 คะแนนสุดท้าย: {score + 50}<br />
            ⏱️ เวลาที่ใช้: {Math.floor(elapsedTime/60) > 0 ? `${Math.floor(elapsedTime/60)} นาที ` : ""}{elapsedTime % 60} วินาที<br />
            💡 คำใบ้ที่สะสม: {hints.length} ข้อ<br />
            ✅ Flowchart สำเร็จ!
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
          <button className="mc-btn mc-btn-green" style={{ fontSize: 22 }} onClick={initGame}>▶ เล่นอีกครั้ง</button>
          <button className="mc-btn mc-btn-blue" style={{ fontSize: 22 }} onClick={() => setScreen("intro")}>◀ เมนูหลัก</button>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<MinecraftMazeGame />);
</script>
</body>
</html>
